<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totti — Voice Walk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 400px; width: 100%; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 40px; }
    
    #status { color: #888; font-size: 14px; margin-bottom: 20px; min-height: 20px; }
    #status.listening { color: #4ade80; }
    #status.thinking { color: #facc15; }
    
    #mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #222;
      border: 3px solid #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      margin: 0 auto 30px;
    }
    #mic-btn:hover { border-color: #666; background: #2a2a2a; }
    #mic-btn.recording { border-color: #ef4444; background: #991b1b; }
    
    #mic-btn svg { width: 32px; height: 32px; fill: #fff; }
    
    #response {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      min-height: 100px;
      text-align: left;
      font-size: 15px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
    }
    #response:empty:before { content: 'Your response will appear here...'; color: #555; }
    
    .hint { color: #555; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ Voice Walk</h1>
    <p class="subtitle">Talk, listen, walk.</p>
    
    <div id="status">Tap to start</div>
    
    <button id="mic-btn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
    </button>
    
    <div id="response"></div>
    
    <p class="hint">Keep your phone in your pocket. Just talk.</p>
  </div>

  <script>
    const micBtn = document.getElementById('mic-btn');
    const status = document.getElementById('status');
    const responseDiv = document.getElementById('response');
    
    let mediaRecorder;
    let isRecording = false;
    let audioChunks = [];
    
    // Speech synthesis for responses
    const synth = window.speechSynthesis;
    
    async function speak(text) {
      return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.1;
        utterance.pitch = 1;
        utterance.onend = resolve;
        utterance.onerror = resolve;
        synth.speak(utterance);
      });
    }
    
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          await sendAudio(audioBlob);
          stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        status.textContent = 'Listening...';
        status.classList.add('listening');
        
        // Auto-stop after 30 seconds
        setTimeout(() => {
          if (isRecording) stopRecording();
        }, 30000);
        
      } catch (err) {
        status.textContent = 'Microphone access denied';
        console.error(err);
      }
    }
    
    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
        status.textContent = 'Processing...';
        status.classList.remove('listening');
      }
    }
    
    async function sendAudio(blob) {
      status.textContent = 'Processing...';
      status.classList.remove('listening');
      
      try {
        // Convert blob to base64
        const arrayBuffer = await blob.arrayBuffer();
        const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
        
        const res = await fetch('/api/talk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audio: base64 })
        });
        
        if (!res.ok) throw new Error('Server error');
        
        const data = await res.json();
        
        responseDiv.innerHTML = data.response.replace(/\n/g, '<br>');
        
        status.textContent = '';
        status.classList.remove('thinking');
        
        // Speak the response
        await speak(data.response);
        
        status.textContent = 'Tap to talk again';
        
      } catch (err) {
        responseDiv.innerHTML = 'Error: ' + err.message;
        status.textContent = 'Tap to try again';
        console.error(err);
      }
    }
    
    micBtn.addEventListener('click', () => {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });
    
    // Keyboard shortcut: spacebar
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        if (isRecording) stopRecording(); else startRecording();
      }
    });
  </script>
</body>
</html>
